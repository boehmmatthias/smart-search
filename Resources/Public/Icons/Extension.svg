<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1a1a2e" />

  <!-- Magnifying glass circle -->
  <circle cx="27" cy="27" r="13" fill="none" stroke="#4fc3f7" stroke-width="3.5"/>

  <!-- Magnifying glass handle -->
  <line x1="36" y1="36" x2="47" y2="47" stroke="#4fc3f7" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Neural / vector dots inside glass -->
  <circle cx="22" cy="24" r="2" fill="#e040fb"/>
  <circle cx="30" cy="22" r="2" fill="#e040fb"/>
  <circle cx="24" cy="31" r="2" fill="#e040fb"/>
  <circle cx="32" cy="30" r="2" fill="#e040fb"/>

  <!-- Connections between dots -->
  <line x1="22" y1="24" x2="30" y2="22" stroke="#e040fb" stroke-width="1" opacity="0.7"/>
  <line x1="22" y1="24" x2="24" y2="31" stroke="#e040fb" stroke-width="1" opacity="0.7"/>
  <line x1="30" y1="22" x2="32" y2="30" stroke="#e040fb" stroke-width="1" opacity="0.7"/>
  <line x1="24" y1="31" x2="32" y2="30" stroke="#e040fb" stroke-width="1" opacity="0.7"/>
  <line x1="30" y1="22" x2="24" y2="31" stroke="#e040fb" stroke-width="1" opacity="0.4"/>
</svg>
